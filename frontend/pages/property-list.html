                        style="
                            width:100%; padding:var(--sp-3) var(--sp-5) var(--sp-3) var(--sp-10);

    <!-- Navbar not found -->

    <div class="pds-container">
        <div class="page-header">
            <h1 class="page-title">Available <i>Masterpieces</i></h1>
            <p class="page-subtitle">Showing 25 exclusive properties</p>
        </div>
        <div class="property-grid">
            <!-- Loaded via JS -->
        </div>
    </div>
<script>
        /* ─ Load Properties ─ */
        window.loadAllProperties = async function(silent = false) {
            const propertyGrid = document.querySelector('.property-grid');
            if (!propertyGrid) return;
            
            if (!silent) {
                propertyGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--color-text-muted);">Loading exclusive properties...</div>';
            }
            
            try {
                let properties = [];
                if (window.PropertiesData) {
                    properties = await window.PropertiesData.getAllProperties();
                }
                
                // Parse URL params for simple filtering
                const params = new URLSearchParams(window.location.search);
                const searchCity = params.get('city');
                const searchType = params.get('type');
                const maxPrice = params.get('maxPrice');

                if (searchCity && searchCity !== 'all') {
                    properties = properties.filter(p => p.city.toLowerCase() === searchCity.toLowerCase());
                }
                if (searchType && searchType !== 'all') {
                    properties = properties.filter(p => p.type.toLowerCase() === searchType.toLowerCase());
                }
                if (maxPrice && maxPrice !== 'all') {
                    properties = properties.filter(p => p.price <= parseInt(maxPrice));
                }
                
                if (!properties || properties.length === 0) {
                    propertyGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--color-text-muted);">No properties found matching your criteria.</div>';
                    return;
                }
                
                propertyGrid.innerHTML = properties.map(p => {
                    const priceStr = p.price >= 10000000 
                        ? '₹' + (p.price / 10000000).toFixed(2) + ' Cr' 
                        : '₹' + (p.price / 100000).toFixed(2) + ' Lac';
                        
                    return `
                    <div class="property-card" onclick="if(window.Navigation) window.Navigation.goToPropertyDetail('${p.id}')">
                        <div class="property-image-wrapper">
                            <img src="${p.images && p.images.length > 0 ? p.images[0] : '../assets/luxury-hero.jpg'}" alt="${p.title}" class="property-image">
                            <div class="property-badge">${p.type.toUpperCase()}</div>
                        </div>
                        <div class="property-content">
                            <div class="property-price">${priceStr}</div>
                            <h3 class="property-title">${p.title}</h3>
                            <div class="property-location">📍 ${p.location}, ${p.city}</div>
                            <div class="property-features">
                                <span>🛏️ ${p.bhk || 3} BHK</span>
                                <span>📏 ${p.sqft || 2000} sq.ft</span>
                                <span>🛁 ${p.bathrooms || 2} Baths</span>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
                
            } catch (e) {
                console.error("Failed to load properties:", e);
                propertyGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:#ef4444;">Failed to load properties. Please try again later.</div>';
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                if (window.loadAllProperties) window.loadAllProperties();
            }, 500);
        });
    </script>
