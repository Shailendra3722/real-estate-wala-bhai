<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Real Estate Wala Bhai</title>
    <meta name="description" content="Sign in to Real Estate Wala Bhai to explore verified properties across India.">
    <meta property="og:title" content="Login - Real Estate Wala Bhai">
    <meta property="og:description" content="Sign in to explore verified properties across India. Buy, Sell, Rent.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://real-estate-app.vercel.app/login.html">
    <meta property="og:image" content="https://real-estate-app.vercel.app/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet">
    <!-- Global App State -->
    <script src="../js/services/appState.js"></script>
    <!-- API Config & Auth Service -->
    <script src="../js/api/apiConfig.js"></script>
    <script src="../js/services/firebaseService.js"></script>
    <!-- Premium 2026 Design System -->
    <link rel="stylesheet" href="../css/premium-design-system.css">
    <style>
        /* ===== LOGIN PAGE - PREMIUM 2026 ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--sp-6) var(--sp-4);
            background: var(--color-bg);
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle mesh gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 20% -20%, rgba(37,99,235,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse 80% 50% at 80% 120%, rgba(124,58,237,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .gradient-bg { display: none; }
        .particles   { display: none; }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: var(--color-surface);
            border-radius: var(--r-2xl);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-2xl), 0 0 0 1px rgba(255,255,255,0.7) inset;
            padding: var(--sp-10) var(--sp-8);
            animation: scaleIn 0.4s var(--ease-spring) both;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.94) translateY(12px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);     }
        }

        .logo-section {
            text-align: center;
            margin-bottom: var(--sp-8);
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--brand-600), var(--violet-500));
            border-radius: var(--r-xl);
            font-size: 1.8rem;
            margin-bottom: var(--sp-5);
            box-shadow: var(--shadow-md), var(--shadow-glow-brand);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-6px); }
        }

        .welcome-title {
            font-size: var(--text-3xl);
            font-weight: var(--fw-bold);
            color: var(--color-text-primary);
            letter-spacing: -0.03em;
            margin-bottom: var(--sp-2);
        }

        .welcome-subtitle {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            line-height: 1.6;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--sp-4);
        }

        .form-group {
            animation: slideUp 0.4s var(--ease-out) both;
        }

        .form-group:nth-child(1) { animation-delay: 80ms;  }
        .form-group:nth-child(2) { animation-delay: 140ms; }
        .form-group:nth-child(3) { animation-delay: 200ms; }
        .form-group:nth-child(4) { animation-delay: 260ms; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        .form-input {
            width: 100%;
            padding: var(--sp-3) var(--sp-4);
            background: var(--color-bg-alt);
            border: 1.5px solid var(--color-border-strong);
            border-radius: var(--r-lg);
            font-size: var(--text-sm);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            transition: all var(--dur-base) var(--ease-out);
            outline: none;
        }

        .form-input::placeholder { color: var(--color-text-muted); }

        .form-input:focus {
            background: var(--color-surface);
            border-color: var(--brand-500);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            transform: translateY(-1px);
        }

        .form-input option { background: var(--color-surface); }

        .btn-continue {
            width: 100%;
            padding: var(--sp-3) var(--sp-6);
            background: linear-gradient(135deg, var(--brand-600) 0%, var(--brand-700) 60%, var(--violet-600) 100%);
            border: none;
            border-radius: var(--r-lg);
            font-size: var(--text-base);
            font-weight: var(--fw-semi);
            color: #fff;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-out);
            margin-top: var(--sp-4);
            box-shadow: var(--shadow-md), var(--shadow-glow-brand);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s var(--ease-out) 320ms both;
        }

        .btn-continue::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-continue:hover::before { left: 100%; }

        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), 0 0 0 4px rgba(37,99,235,0.2), 0 8px 32px rgba(37,99,235,0.3);
        }

        .btn-continue:active { transform: scale(0.98); }
        .btn-continue:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        .divider {
            display: flex;
            align-items: center;
            margin: var(--sp-5) 0;
            gap: var(--sp-4);
        }

        .divider-line { flex: 1; height: 1px; background: var(--color-border); }

        .divider-text {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            white-space: nowrap;
            font-weight: var(--fw-medium);
        }

        .social-login { display: flex; gap: var(--sp-3); }

        .social-btn {
            flex: 1;
            padding: var(--sp-3);
            background: var(--color-bg-alt);
            border: 1.5px solid var(--color-border-strong);
            border-radius: var(--r-lg);
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-out);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--sp-2);
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            font-family: var(--font-sans);
            font-weight: var(--fw-medium);
        }

        .social-btn:hover {
            background: var(--color-surface);
            border-color: var(--brand-300);
            color: var(--color-text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .social-icon { font-size: 1.2rem; }

        .footer-text {
            text-align: center;
            margin-top: var(--sp-5);
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        .footer-link {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: var(--fw-medium);
            transition: color var(--dur-base);
        }

        .footer-link:hover { color: var(--brand-700); }

        .helper-text {
            display: flex; align-items: center; gap: var(--sp-2);
            margin-top: var(--sp-2); font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        .helper-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px;
            background: rgba(59,130,246,0.15); border-radius: var(--r-full);
            font-size: 0.55rem;
        }

        @media (max-width: 480px) {
            .login-card { padding: var(--sp-8) var(--sp-5); }
            .welcome-title { font-size: var(--text-2xl); }
            .social-login { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="gradient-bg"></div>
    
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main login container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo and welcome section -->
            <div class="logo-section">
                <div class="logo-icon">🏡</div>
                <h1 class="welcome-title">Welcome 👋</h1>
                <p class="welcome-subtitle">Sign in to explore verified properties near you</p>
            </div>

            <!-- Auth form -->
            <form class="auth-form" id="authForm">
                <div class="form-group" id="nameGroup">
                    <input 
                        type="text" 
                        class="form-input" 
                        id="nameInput"
                        placeholder="Your full name"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="email" 
                        class="form-input" 
                        id="emailInput"
                        placeholder="Email address"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        class="form-input" 
                        id="passwordInput"
                        placeholder="Password (min 6 characters)"
                        required
                        autocomplete="current-password"
                        minlength="6"
                    >
                </div>

                <div class="form-group" id="roleGroup">
                    <select class="form-input" id="roleSelect">
                        <option value="">I am looking to... (for new accounts)</option>
                        <option value="buyer">Buy a Property</option>
                        <option value="owner">Sell/Rent a Property</option>
                    </select>
                </div>

                <button type="submit" class="btn-continue" id="authBtn">
                    Sign In / Register
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or continue with</span>
                <div class="divider-line"></div>
            </div>

            <!-- Social login options -->
            <div class="social-login">
                <button class="social-btn" onclick="handleGoogleLogin()">
                    <span class="social-icon">🔍</span>
                    <span>Google</span>
                </button>
                <button class="social-btn" onclick="handleEmailLogin()">
                    <span class="social-icon">📧</span>
                    <span>Email</span>
                </button>
            </div>

            <!-- Footer -->
            <p class="footer-text">
                By continuing, you agree to our <a href="terms.html" class="footer-link">Terms</a> &amp; <a href="privacy.html" class="footer-link">Privacy Policy</a>
            </p>
            <p style="text-align:center; margin-top:1.25rem;">
                <a href="home.html" style="color:#94a3b8; font-size:0.9rem; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#e2e8f0'" onmouseout="this.style.color='#94a3b8'">Browse as Guest &rarr;</a>
            </p>
        </div>
    </div>

    <script>
        // ── Floating particles ──
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 10 + 15) + 's';
            const size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            particlesContainer.appendChild(p);
        }

        // ── Helper: show/hide error ──
        function showError(msg) {
            let err = document.getElementById('formError');
            if (!err) {
                err = document.createElement('div');
                err.id = 'formError';
                err.style.cssText = 'background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:0.85rem 1.1rem;border-radius:12px;font-size:0.9rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;';
                document.querySelector('.auth-form').prepend(err);
            }
            err.innerHTML = '<span>⚠️</span><span>' + msg + '</span>';
        }
        function clearError() {
            const e = document.getElementById('formError');
            if (e) e.remove();
        }

        // ── Helper: redirect after login ──
        function redirectAfterLogin(role) {
            const intent = AppState.getIntent();
            let url = 'home.html';
            if (intent) {
                if (intent === 'sell' || intent === 'owner') url = 'add-property-step1.html';
                else if (intent === 'map') url = 'map-explore.html';
                else if (intent === 'rent') url = 'home.html?filter=rent';
                else if (intent === 'buy') url = 'home.html?filter=buy';
                AppState.clearIntent();
            } else if (role === 'owner') {
                url = 'add-property-step1.html';
            }
            window.location.href = url;
        }

        // ── Store user into AppState ──
        function syncUserToAppState(userData) {
            AppState.setUser({
                id: userData.id || userData.uid,
                name: userData.name || 'User',
                email: userData.email,
                phone: userData.phone || '',
                uid: userData.id || userData.uid
            });
            AppState.setRole(userData.role || 'buyer');
        }

        // ── Check if already logged in → skip login page ──
        FirebaseService.onAuthChange(function(user) {
            if (user && window.location.pathname.includes('login')) {
                syncUserToAppState(user);
                redirectAfterLogin(user.role);
            }
        });

        // ── Form submit: try login first, register if not found ──
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearError();

            const email    = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const name     = document.getElementById('nameInput').value.trim();
            const role     = document.getElementById('roleSelect').value || 'buyer';

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            const btn = document.getElementById('authBtn');
            btn.textContent = '⏳ Please wait...';
            btn.disabled = true;

            try {
                // ── Try SIGN IN first ──
                let userData;
                try {
                    userData = await FirebaseService.login(email, password);
                    console.log('✅ Signed in:', userData);
                } catch (loginErr) {
                    // ── Not found → REGISTER ──
                    if (!name) {
                        showError('New user? Please enter your name too.');
                        btn.textContent = 'Sign In / Register';
                        btn.disabled = false;
                        document.getElementById('nameInput').focus();
                        return;
                    }
                    userData = await FirebaseService.register(name, email, password, '', role);
                    console.log('✅ Registered:', userData);
                }

                // ── Sync to AppState ──
                syncUserToAppState(userData);

                btn.textContent = '✅ Success!';
                setTimeout(() => redirectAfterLogin(userData.role || role), 800);

            } catch (err) {
                console.error('Auth error:', err);
                let msg = 'Something went wrong. Please try again.';
                if (err.code === 'auth/wrong-password')    msg = 'Wrong password. Please try again.';
                if (err.code === 'auth/invalid-email')      msg = 'Invalid email address.';
                if (err.code === 'auth/email-already-in-use') msg = 'Email already registered. Try signing in.';
                if (err.code === 'auth/weak-password')      msg = 'Password must be at least 6 characters.';
                if (err.code === 'auth/too-many-requests')  msg = 'Too many attempts. Please try again later.';
                if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your internet connection.';
                showError(msg);
                btn.textContent = 'Sign In / Register';
                btn.disabled = false;
            }
        });

        // ── Social: Google sign-in ──
        async function handleGoogleLogin() {
            showError('Google Login is currently disabled while we upgrade our systems.');
        }

        function handleEmailLogin() {
            document.getElementById('emailInput').focus();
        }
    </script>
</body>
</html>
