<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Real Estate Wala Bhai</title>
    <meta name="description" content="Sign in to Real Estate Wala Bhai to explore verified properties across India.">
    <meta property="og:title" content="Login - Real Estate Wala Bhai">
    <meta property="og:description" content="Sign in to explore verified properties across India. Buy, Sell, Rent."
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://real-estate-app.vercel.app/login.html">
    <meta property="og:image" content="https://real-estate-app.vercel.app/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Global App State -->
    <script src="app-state.js"></script>
    <!-- Firebase SDK (compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-service.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
            min-height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Animated gradient background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                #667eea 0%, 
                #764ba2 25%, 
                #f093fb 50%, 
                #4facfe 75%, 
                #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            opacity: 0.15;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Main container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glassmorphism card */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo section */
        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
        }

        .welcome-subtitle {
            font-size: 1.05rem;
            color: #cbd5e1;
            font-weight: 300;
            line-height: 1.6;
        }

        /* Form section */
        .auth-form {
            margin-top: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #e2e8f0;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            font-size: 1rem;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .helper-text {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .helper-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* Continue button */
        .btn-continue {
            width: 100%;
            padding: 1.1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-continue::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-continue:hover::before {
            left: 100%;
        }

        .btn-continue:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-continue:active {
            transform: translateY(-1px);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            gap: 1rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 300;
        }

        /* Social login */
        .social-login {
            display: flex;
            gap: 1rem;
        }

        .social-btn {
            flex: 1;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .social-icon {
            font-size: 1.3rem;
        }

        /* Footer text */
        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .footer-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: #764ba2;
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .welcome-title {
                font-size: 2rem;
            }

            .welcome-subtitle {
                font-size: 0.95rem;
            }

            .social-login {
                flex-direction: column;
            }
        }

        /* Input animation on page load */
        .form-group {
            animation: slideInLeft 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }

        .btn-continue {
            animation: slideInLeft 0.6s ease-out 0.4s backwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="gradient-bg"></div>
    
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main login container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo and welcome section -->
            <div class="logo-section">
                <div class="logo-icon">🏡</div>
                <h1 class="welcome-title">Welcome 👋</h1>
                <p class="welcome-subtitle">Sign in to explore verified properties near you</p>
            </div>

            <!-- Auth form -->
            <form class="auth-form" id="authForm">
                <div class="form-group" id="nameGroup">
                    <input 
                        type="text" 
                        class="form-input" 
                        id="nameInput"
                        placeholder="Your full name"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="email" 
                        class="form-input" 
                        id="emailInput"
                        placeholder="Email address"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        class="form-input" 
                        id="passwordInput"
                        placeholder="Password (min 6 characters)"
                        required
                        autocomplete="current-password"
                        minlength="6"
                    >
                </div>

                <div class="form-group" id="roleGroup">
                    <select class="form-input" id="roleSelect">
                        <option value="">I am looking to... (for new accounts)</option>
                        <option value="buyer">Buy a Property</option>
                        <option value="owner">Sell/Rent a Property</option>
                    </select>
                </div>

                <button type="submit" class="btn-continue" id="authBtn">
                    Sign In / Register
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or continue with</span>
                <div class="divider-line"></div>
            </div>

            <!-- Social login options -->
            <div class="social-login">
                <button class="social-btn" onclick="handleGoogleLogin()">
                    <span class="social-icon">🔍</span>
                    <span>Google</span>
                </button>
                <button class="social-btn" onclick="handleEmailLogin()">
                    <span class="social-icon">📧</span>
                    <span>Email</span>
                </button>
            </div>

            <!-- Footer -->
            <p class="footer-text">
                By continuing, you agree to our <a href="terms.html" class="footer-link">Terms</a> &amp; <a href="privacy.html" class="footer-link">Privacy Policy</a>
            </p>
            <p style="text-align:center; margin-top:1.25rem;">
                <a href="home.html" style="color:#94a3b8; font-size:0.9rem; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#e2e8f0'" onmouseout="this.style.color='#94a3b8'">Browse as Guest &rarr;</a>
            </p>
        </div>
    </div>

    <script>
        // ── Floating particles ──
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 10 + 15) + 's';
            const size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            particlesContainer.appendChild(p);
        }

        // ── Helper: show/hide error ──
        function showError(msg) {
            let err = document.getElementById('formError');
            if (!err) {
                err = document.createElement('div');
                err.id = 'formError';
                err.style.cssText = 'background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:0.85rem 1.1rem;border-radius:12px;font-size:0.9rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;';
                document.querySelector('.auth-form').prepend(err);
            }
            err.innerHTML = '<span>⚠️</span><span>' + msg + '</span>';
        }
        function clearError() {
            const e = document.getElementById('formError');
            if (e) e.remove();
        }

        // ── Helper: redirect after login ──
        function redirectAfterLogin(role) {
            const intent = AppState.getIntent();
            let url = 'home.html';
            if (intent) {
                if (intent === 'sell' || intent === 'owner') url = 'add-property-step1.html';
                else if (intent === 'map') url = 'map-explore.html';
                else if (intent === 'rent') url = 'home.html?filter=rent';
                else if (intent === 'buy') url = 'home.html?filter=buy';
                AppState.clearIntent();
            } else if (role === 'owner') {
                url = 'add-property-step1.html';
            }
            window.location.href = url;
        }

        // ── Store Firebase user into AppState ──
        function syncUserToAppState(firebaseUser, profileData) {
            AppState.setUser({
                id: firebaseUser.uid,
                name: profileData.name || firebaseUser.displayName || 'User',
                email: firebaseUser.email,
                phone: profileData.phone || '',
                uid: firebaseUser.uid
            });
            AppState.setRole(profileData.role || 'buyer');
            AppState.setAuthToken(firebaseUser.uid);
        }

        // ── Check if already logged in → skip login page ──
        FirebaseService.onAuthChange(function(user) {
            if (user && window.location.pathname.includes('login')) {
                // Already logged into Firebase — sync and go home
                syncUserToAppState({ uid: user.uid, email: user.email, displayName: user.name }, user);
                redirectAfterLogin(user.role);
            }
        });

        // ── Form submit: try login first, register if not found ──
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearError();

            const email    = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const name     = document.getElementById('nameInput').value.trim();
            const role     = document.getElementById('roleSelect').value || 'buyer';

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            const btn = document.getElementById('authBtn');
            btn.textContent = '⏳ Please wait...';
            btn.disabled = true;

            try {
                // ── Try SIGN IN first ──
                let userData;
                try {
                    userData = await FirebaseService.login(email, password);
                    console.log('✅ Signed in:', userData);
                } catch (loginErr) {
                    if (loginErr.code === 'auth/user-not-found' || loginErr.code === 'auth/invalid-credential' || loginErr.code === 'auth/wrong-password') {
                        // ── Not found → REGISTER ──
                        if (!name) {
                            showError('New user? Please enter your name too.');
                            btn.textContent = 'Sign In / Register';
                            btn.disabled = false;
                            document.getElementById('nameInput').focus();
                            return;
                        }
                        userData = await FirebaseService.register(name, email, password, '', role);
                        console.log('✅ Registered:', userData);
                    } else {
                        throw loginErr;
                    }
                }

                // ── Sync to AppState (localStorage, for backward compat) ──
                Firebase_auth_currentUser_temp = firebase.auth().currentUser;
                syncUserToAppState(Firebase_auth_currentUser_temp || { uid: userData.uid, email, displayName: name }, userData);

                btn.textContent = '✅ Success!';
                setTimeout(() => redirectAfterLogin(userData.role || role), 800);

            } catch (err) {
                console.error('Auth error:', err);
                let msg = 'Something went wrong. Please try again.';
                if (err.code === 'auth/wrong-password')    msg = 'Wrong password. Please try again.';
                if (err.code === 'auth/invalid-email')      msg = 'Invalid email address.';
                if (err.code === 'auth/email-already-in-use') msg = 'Email already registered. Try signing in.';
                if (err.code === 'auth/weak-password')      msg = 'Password must be at least 6 characters.';
                if (err.code === 'auth/too-many-requests')  msg = 'Too many attempts. Please try again later.';
                if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your internet connection.';
                showError(msg);
                btn.textContent = 'Sign In / Register';
                btn.disabled = false;
            }
        });

        // Temp global needed for auth current user sync
        let Firebase_auth_currentUser_temp = null;

        // ── Social: Google sign-in ──
        async function handleGoogleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                const firebaseUser = result.user;

                // Check if user doc exists, if not create it
                const db = firebase.firestore();
                const userDoc = await db.collection('users').doc(firebaseUser.uid).get();
                let profileData;
                if (!userDoc.exists) {
                    profileData = {
                        uid: firebaseUser.uid,
                        name: firebaseUser.displayName || 'User',
                        email: firebaseUser.email,
                        phone: '',
                        role: 'buyer',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection('users').doc(firebaseUser.uid).set(profileData);
                } else {
                    profileData = userDoc.data();
                }

                syncUserToAppState(firebaseUser, profileData);
                redirectAfterLogin(profileData.role);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showError('Google sign-in failed: ' + (err.message || 'Please try again.'));
                }
            }
        }

        function handleEmailLogin() {
            document.getElementById('emailInput').focus();
        }
    </script>
</body>
</html>
