<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property - Step 1 - Real Estate Wala Bhai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="form-styles.css">
    <script src="app-state.js"></script>
    <script src="form-utils.js"></script>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 17%"></div>
            </div>
            <div class="progress-text">Step 1 of 6 (17%)</div>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <h1 class="form-title">What do you want to do?</h1>
            <p class="form-subtitle">आप क्या करना चाहते हैं?</p>

            <form id="step1Form">
                <!-- Listing Type -->
                <div class="form-group">
                    <label class="form-label">
                        Choose one / एक चुनें
                    </label>
                    
                    <div class="option-group">
                        <div class="option-card">
                            <input type="radio" name="listingType" value="sell" id="listingSell" class="option-input" required>
                            <label for="listingSell" class="option-label">
                                <div class="option-icon">🏠</div>
                                <div class="option-title">Sell Property</div>
                                <div class="option-desc">संपत्ति बेचें</div>
                            </label>
                        </div>

                        <div class="option-card">
                            <input type="radio" name="listingType" value="rent" id="listingRent" class="option-input" required>
                            <label for="listingRent" class="option-label">
                                <div class="option-icon">🏘️</div>
                                <div class="option-title">Rent Out</div>
                                <div class="option-desc">किराए पर दें</div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Property Type -->
                <div class="form-group">
                    <label class="form-label">
                        What type of property? / संपत्ति का प्रकार?
                    </label>
                    
                    <div class="option-group">
                        <div class="option-card">
                            <input type="radio" name="propertyType" value="flat" id="typeFlat" class="option-input" required>
                            <label for="typeFlat" class="option-label">
                                <div class="option-icon">🏢</div>
                                <div class="option-title">Flat/Apartment</div>
                                <div class="option-desc">फ्लैट</div>
                            </label>
                        </div>

                        <div class="option-card">
                            <input type="radio" name="propertyType" value="house" id="typeHouse" class="option-input" required>
                            <label for="typeHouse" class="option-label">
                                <div class="option-icon">🏡</div>
                                <div class="option-title">Independent House</div>
                                <div class="option-desc">मकान</div>
                            </label>
                        </div>

                        <div class="option-card">
                            <input type="radio" name="propertyType" value="plot" id="typePlot" class="option-input" required>
                            <label for="typePlot" class="option-label">
                                <div class="option-icon">📐</div>
                                <div class="option-title">Plot/Land</div>
                                <div class="option-desc">जमीन</div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Help Text -->
                <div class="help-text">
                    <div class="help-icon">💡</div>
                    <div class="help-content">
                        <div class="help-title">Tip / सुझाव</div>
                        <div class="help-desc">
                            Your information is automatically saved. You can return anytime to complete!
                            <br>आपकी जानकारी अपने-आप सेव हो रही है। आप कभी भी वापस आकर पूरा कर सकते हैं!
                        </div>
                    </div>
                </div>

                <!-- Navigation -->
                <div class="form-navigation">
                    <button type="button" class="btn btn-back" onclick="window.location.href='home.html'">
                        ← Cancel / रद्द करें
                    </button>
                    <button type="button" class="btn btn-next" onclick="FormUtils.nextStep()">
                        Continue / जारी रखें →
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check role permission
        if (!AppState.canAddProperty()) {
            const modalHtml = `
            <div id="authModalOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.4s ease;">
                <div style="background:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.5);border-radius:32px;padding:48px 40px;max-width:440px;width:90%;box-shadow:0 30px 60px rgba(0,0,0,0.08);text-align:center;transform:translateY(30px) scale(0.95);transition:all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                    <div style="width:88px;height:88px;background:linear-gradient(135deg, var(--primary-50), var(--primary-100));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 28px;box-shadow:inset 0 4px 10px rgba(255,255,255,0.8);">🛡️</div>
                    <h2 style="font-family:'Playfair Display', serif;font-size:2rem;color:var(--neutral-900);margin-bottom:16px;">Owner Verification</h2>
                    <p style="font-family:'Outfit', sans-serif;color:var(--neutral-600);font-size:1.05rem;margin-bottom:40px;line-height:1.6;">To list properties on our premium network, we need to verify your account as a property owner. It only takes a minute!</p>
                    <div style="display:flex;flex-direction:column;gap:16px;">
                        <button onclick="window.location.href='upload-verification.html'" style="background:var(--neutral-900);color:white;border:none;padding:18px;border-radius:100px;font-family:'Outfit',sans-serif;font-weight:600;font-size:1.05rem;cursor:pointer;box-shadow:0 15px 30px rgba(0,0,0,0.15);transition:all 0.3s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 20px 40px rgba(0,0,0,0.2)';" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 15px 30px rgba(0,0,0,0.15)';">Verify My Account</button>
                        <button onclick="window.location.href='home.html'" style="background:transparent;color:var(--neutral-500);border:none;padding:16px;border-radius:100px;font-family:'Outfit',sans-serif;font-weight:500;font-size:1rem;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.color='var(--neutral-800)';" onmouseout="this.style.color='var(--neutral-500)';">Maybe Later</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // Trigger animation
            setTimeout(() => {
                const overlay = document.getElementById('authModalOverlay');
                overlay.style.opacity = '1';
                overlay.children[0].style.transform = 'translateY(0) scale(1)';
            }, 50);
        }
    </script>
</body>
</html>
