<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listings - Real Estate Wala Bhai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 1.5rem;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            opacity: 0.08;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .result-count {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Property Card */
        .property-card {
            background: var(--bg-elevated);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            gap: 1.25rem;
        }

        .property-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .property-image {
            width: 140px;
            height: 140px;
            border-radius: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .image-badge {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            padding: 0.35rem 0.75rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .property-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .property-price {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .property-details {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .property-location {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: auto;
        }

        .btn {
            padding: 0.7rem 1.25rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-primary);
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            flex: 1;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .property-card {
                flex-direction: column;
            }

            .property-image {
                width: 100%;
                height: 180px;
            }

            .card-actions {
                flex-direction: column;
            }
        }
    </style>
    <!-- Premium Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>
    <script src="smooth-scroll.js"></script>
    <!-- Luxury Design System -->
    <link rel="stylesheet" href="luxury-design-system.css">
    <link rel="stylesheet" href="luxury-components.css">
    <!-- Theme Manager -->
    <script src="theme-manager.js"></script>
    <!-- Profile Menu -->
    <script src="profile-menu.js"></script>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="page-title">Available Properties</h1>
            <p class="result-count">Showing 25 properties</p>
        </div>

        <!-- Property Card 1 -->
        <div class="property-card">
            <div class="property-image">
                <div class="image-badge">Featured</div>
            </div>
            <div class="property-content">
                <div class="property-price">₹ 45,00,000</div>
                <div class="property-details">2 BHK • 980 sqft</div>
                <div class="property-location">
                    <span>📍</span>
                    <span>Gomti Nagar, Lucknow</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="viewDetails()">View Details</button>
                    <button class="btn btn-secondary" onclick="viewOnMap()">View on Map</button>
                </div>
            </div>
        </div>

        <!-- Property Card 2 -->
        <div class="property-card">
            <div class="property-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <div class="image-badge">New</div>
            </div>
            <div class="property-content">
                <div class="property-price">₹ 38,50,000</div>
                <div class="property-details">3 BHK • 1250 sqft</div>
                <div class="property-location">
                    <span>📍</span>
                    <span>Hazratganj, Lucknow</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="viewDetails()">View Details</button>
                    <button class="btn btn-secondary" onclick="viewOnMap()">View on Map</button>
                </div>
            </div>
        </div>

        <!-- Property Card 3 -->
        <div class="property-card">
            <div class="property-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <div class="image-badge">Hot Deal</div>
            </div>
            <div class="property-content">
                <div class="property-price">₹ 52,00,000</div>
                <div class="property-details">2 BHK • 1100 sqft</div>
                <div class="property-location">
                    <span>📍</span>
                    <span>Indira Nagar, Lucknow</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="viewDetails()">View Details</button>
                    <button class="btn btn-secondary" onclick="viewOnMap()">View on Map</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function viewDetails() {
            alert('Opening property details...');
        }

        function viewOnMap() {
            alert('Opening map view...');
        }
    </script>
</body>
</html>
