<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Real Estate Wala Bhai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Luxury Design System -->
    <link rel="stylesheet" href="luxury-design-system.css">
    <link rel="stylesheet" href="luxury-components.css">
    <link rel="stylesheet" href="luxury-animations.css">
    <!-- 3D Modern Design System -->
    <link rel="stylesheet" href="3d-modern.css">
    <!-- Premium Loading Animation -->
    <link rel="stylesheet" href="loading-animation.css">
    <!-- UX Components -->
    <link rel="stylesheet" href="ux-components.css">
    <script src="loading-animation.js"></script>
    <!-- Global App State -->
    <script src="app-state.js"></script>
    <!-- API Configuration -->
    <script src="api-config.js"></script>
    <!-- Real Listings Static Data (fallback) -->
    <script src="real-listings-data.js"></script>
    <!-- Properties API Service -->
    <script src="properties-data-api.js"></script>
    <!-- Navigation Service -->
    <script src="navigation.js"></script>
    <!-- Mock API for Contact Forms -->
    <script src="mock-api.js"></script>
    <!-- Empty States System -->
    <script src="empty-states.js"></script>
    <!-- Toast Notifications -->
    <script src="toast.js"></script>
    <style>
        /* Luxury specific overrides for home page */
        
        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Subtle gradient overlay for depth */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                var(--navy-900) 0%, 
                var(--navy-800) 50%, 
                var(--navy-900) 100%);
            background-size: 200% 200%;
            animation: subtleGradientShift 20s ease infinite;
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes subtleGradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--space-6);
        }

        /* Header - Premium Glass Effect */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-12);
            padding: var(--space-4) 0;
            animation: fadeInUp var(--duration-slow) var(--ease-smooth);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--royal-600) 0%, var(--royal-700) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--shadow-lg), var(--glow-royal);
            transition: transform var(--duration-normal) var(--ease-smooth);
        }

        .logo-icon:hover {
            transform: scale(1.05);
        }

        .logo-text {
            font-weight: var(--font-semibold);
            font-size: var(--text-xl);
            color: var(--navy-900);
            letter-spacing: -0.01em;
        }

        .user-profile {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--royal-600) 0%, var(--royal-700) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
            box-shadow: var(--shadow-md);
        }

        .user-profile:hover {
            transform: scale(1.08);
            box-shadow: var(--shadow-lg), var(--glow-royal);
        }

        /* Search section - Calm and minimal */
        .search-section {
            margin-bottom: var(--space-12);
            animation: fadeInUp var(--duration-slow) var(--ease-smooth) 0.1s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: var(--space-4) var(--space-6) var(--space-4) var(--space-12);
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: var(--text-base);
            color: var(--text-primary);
            font-family: var(--font-primary);
            transition: all var(--duration-normal) var(--ease-smooth);
            outline: none;
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-input:focus {
            background: var(--bg-elevated);
            border-color: var(--royal-600);
            box-shadow: var(--shadow-md), 0 0 0 3px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: var(--text-tertiary);
        }

        /* Quick actions section - Premium cards */
        .quick-section {
            margin-bottom: var(--space-12);
            animation: fadeInUp var(--duration-slow) var(--ease-smooth) 0.2s backwards;
        }

        .section-title {
            font-size: var(--text-2xl);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-6);
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--space-4);
        }

        .action-btn {
            padding: var(--space-6) var(--space-5);
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            border-color: var(--royal-600);
            box-shadow: var(--shadow-lg), var(--glow-royal);
        }

        .action-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .action-btn-content {
            position: relative;
            z-index: 1;
        }

        .action-icon {
            font-size: 2.5rem;
            margin-bottom: var(--space-3);
            display: block;
        }

        .action-text {
            font-size: var(--text-base);
            font-weight: var(--font-medium);
            color: var(--text-primary);
        }

        /* Map button - Royal Blue accent */
        .action-btn.map-btn {
            background: linear-gradient(135deg, var(--royal-600) 0%, var(--royal-700) 100%);
            border-color: var(--royal-700);
        }

        .action-btn.map-btn .action-text {
            color: var(--text-on-accent);
        }

        .action-btn.map-btn:hover {
            box-shadow: var(--shadow-xl), var(--glow-royal);
        }

        /* Featured section */
        .featured-section {
            margin-bottom: var(--space-12);
            animation: fadeInUp var(--duration-slow) var(--ease-smooth) 0.3s backwards;
        }

        .featured-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-6);
        }

        .view-all {
            font-size: var(--text-sm);
            color: var(--royal-600);
            text-decoration: none;
            font-weight: var(--font-medium);
            transition: color var(--duration-normal) var(--ease-smooth);
        }

        .view-all:hover {
            color: var(--royal-700);
        }

        /* Property cards - Luxury styling */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-6);
        }


        .property-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--duration-normal) var(--ease-smooth);
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .property-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl), 0 0 32px rgba(37, 99, 235, 0.08);
            border-color: var(--border-medium);
        }

        .property-image {
            width: 100%;
            height: 220px;
            background: var(--gray-200);
            position: relative;
            overflow: hidden;
        }

        .property-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--duration-slow) var(--ease-smooth);
        }

        .property-card:hover .property-image img {
            transform: scale(1.06);
        }

        .property-badge {
            position: absolute;
            top: var(--space-3);
            left: var(--space-3);
            padding: var(--space-2) var(--space-3);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            font-weight: var(--font-medium);
            color: #FFFFFF;
        }

        /* Verified Badge - Gold */
        .property-badge.verified {
            background: var(--gold-100);
            color: var(--gold-600);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
        }

        .favorite-btn {
            position: absolute;
            top: var(--space-3);
            right: var(--space-3);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
            box-shadow: var(--shadow-sm);
        }

        .favorite-btn:hover {
            transform: scale(1.1);
            background: var(--royal-600);
            color: #FFFFFF;
            box-shadow: var(--shadow-md);
        }

        .property-info {
            padding: var(--space-5);
        }

        .property-price {
            font-size: var(--text-2xl);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-2);
            color: var(--navy-900);
            letter-spacing: -0.01em;
        }

        .property-name {
            font-size: var(--text-base);
            font-weight: var(--font-medium);
            margin-bottom: var(--space-2);
            color: var(--text-primary);
        }

        .property-location {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .property-specs {
            display: flex;
            gap: var(--space-4);
            padding-top: var(--space-4);
            border-top: 1px solid var(--border-subtle);
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        .spec-icon {
            font-size: var(--text-base);
            color: var(--text-tertiary);
        }

        /* View Details Button - Royal Blue */
        .btn-view-details {
            width: 100%;
            padding: var(--space-3) var(--space-5);
            background: linear-gradient(135deg, var(--royal-600) 0%, var(--royal-700) 100%);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            color: var(--text-on-accent);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
            font-family: var(--font-primary);
            box-shadow: var(--shadow-sm);
        }

        .btn-view-details:hover {
            background: linear-gradient(135deg, var(--royal-700) 0%, var(--royal-600) 100%);
            box-shadow: var(--shadow-md), var(--glow-royal);
            transform: translateY(-1px);
        }

        .btn-view-details:active {
            transform: scale(0.98);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: var(--space-4);
            }

            .quick-actions {
                grid-template-columns: repeat(3, 1fr);
            }

            .property-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: var(--text-xl);
            }
        }

        @media (max-width: 480px) {
            .quick-actions {
                grid-template-columns: 1fr;
            }

            .action-btn {
                padding: var(--space-4) var(--space-3);
            }
        }

        .btn-view-details:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-view-details:active {
            transform: translateY(0);
        }

        /* Bottom navigation (mobile) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            display: none;
            z-index: 1000;
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
        }

        .nav-item.active {
            color: #667eea;
        }

        .nav-item:hover {
            color: #667eea;
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .bottom-nav {
                display: block;
            }

            body {
                padding-bottom: 80px;
            }
        }
    </style>
    <!-- Premium Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>
    <script src="smooth-scroll.js"></script>
    <!-- Theme Manager -->
    <script src="theme-manager.js"></script>
    <!-- Profile Menu -->
    <script src="profile-menu.js"></script>
</head>
<body>
    <!-- Animated background -->
    <div class="gradient-bg"></div>
    <!-- 3D Floating Orbs -->
    <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    
    <!-- Main container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon logo-icon-3d">🏡</div>
                <span class="logo-text">Real Estate Wala Bhai</span>
            </div>
            <!-- Theme Toggle -->
            <button class="theme-toggle-btn" aria-label="Toggle theme" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; transition: transform 0.2s ease; margin-right: 1rem;">🌙</button>
            <div class="user-profile user-profile-3d">👤</div>
        </header>

        <!-- Search section -->
        <section class="search-section">
            <div class="search-container search-3d">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Search by area, city, or landmark"
                    id="searchInput"
                >
            </div>
        </section>

        <!-- Quick actions -->
        <section class="quick-section">
            <h2 class="section-title section-title-3d">What are you looking for?</h2>
            <div class="quick-actions">
                <button class="btn-3d-crystal" onclick="handleAction('buy')">
                    <span class="crystal-tile-icon">🏠</span>
                    <div class="crystal-tile-text">Buy</div>
                </button>
                <button class="btn-3d-crystal" onclick="handleAction('sell')">
                    <span class="crystal-tile-icon">🏷️</span>
                    <div class="crystal-tile-text">Sell Property</div>
                </button>
                <button class="btn-3d-crystal crystal-map" onclick="handleAction('map')">
                    <span class="crystal-tile-icon">🗺️</span>
                    <div class="crystal-tile-text">Explore on Map</div>
                </button>
            </div>
        </section>

        <!-- All properties -->
        <section class="featured-section">
            <div class="featured-header">
                <h2 class="section-title section-title-3d">All Properties</h2>
                <a href="#" class="view-all" onclick="handleAction('filter'); return false;">Filter →</a>
            </div>
            <div class="property-grid">
                <!-- Properties will be loaded dynamically from PropertiesData -->
            </div>
        </section>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
        <div class="nav-items">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Search</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">❤️</span>
                <span class="nav-label">Saved</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </div>
        </div>
    </nav>

    <script src="navigation.js"></script>
    <script>
        // ==================== INITIALIZATION ====================
        
        // Check if user is logged in on page load
        window.addEventListener('DOMContentLoaded', function() {
            // Check if logged in to determine what to show
            const isLoggedIn = AppState.isLoggedIn();
            
            if (isLoggedIn) {
                // Get user data
                const user = AppState.getUser();
                const role = AppState.getRole();
                
                console.log('✅ User logged in:', user);
                console.log('📋 User role:', role);
                
                // Update user profile display
                updateUserProfile();
                
                // Check for URL parameters (e.g., ?filter=buy or ?filter=rent)
                const urlParams = new URLSearchParams(window.location.search);
                const filterType = urlParams.get('filter');
                
                if (filterType === 'buy') {
                    console.log('🔍 Applying buy filter from URL');
                    handleAction('buy');
                } else if (filterType === 'rent') {
                    console.log('🔍 Applying rent filter from URL');
                    handleAction('rent');
                } else {
                    // Load all verified properties
                    loadAllProperties();
                }
            } else {
                // User not logged in - show properties with limited functionality
                console.log('ℹ️ User not logged in - showing properties in guest mode');
                
                // Show generic user icon
                const userProfileIcon = document.querySelector('.user-profile');
                userProfileIcon.textContent = '👤';
                userProfileIcon.onclick = handleGuestProfileClick;
                
                // Load properties even for guest users
                loadAllProperties();
            }
        });
        
        // ==================== LOAD PROPERTIES ====================
        
        
        async function loadAllProperties() {
            const propertyGrid = document.querySelector('.property-grid');
            const sectionTitle = document.querySelector('.featured-section .section-title');
            
            // Reset title
            sectionTitle.textContent = 'All Properties';
            
            // Show loading skeletons
            EmptyStates.showLoadingSkeletons(propertyGrid, 6);
            
            try {
                // Fetch from API (async)
                const allProperties = await PropertiesData.getVerifiedProperties();
                
                // Clear loading skeletons
                propertyGrid.innerHTML = '';
                
                if (allProperties.length === 0) {
                    propertyGrid.innerHTML = EmptyStates.getNoPropertiesState();
                    return;
                }
                
                // Render each property card with fade-in animation
                allProperties.forEach((property, index) => {
                    const card = createPropertyCard(property);
                    card.classList.add('fade-in');
                    card.style.animationDelay = `${index * 0.05}s`;
                    propertyGrid.appendChild(card);
                });
                
                console.log(`📦 Loaded ${allProperties.length} verified properties`);
            } catch (error) {
                console.error('❌ Failed to load properties:', error);
                propertyGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                        <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 1rem;">⚠️ Failed to load properties</p>
                        <p style="color: var(--text-tertiary);">Please check if the backend server is running.</p>
                        <button onclick="loadAllProperties()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--royal-600); color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }
        
        function createPropertyCard(property) {
            const card = document.createElement('div');
            card.dataset.propertyId = property.id;
            
            // Generate gradient background
            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
            ];
            const randomGradient = gradients[Math.floor(Math.random() * gradients.length)];
            
            // Format price
            const formattedPrice = PropertiesData.formatPrice(property.price, property.listingType);
            
            // Get verification badge
            const badge = PropertiesData.getVerificationBadge(property.verificationStatus);
            
            // Use real image if available, fallback to gradient
            const hasImage = property.images && property.images.length > 0;
            const imageHtml = hasImage
                ? `<img src="${property.images[0]}" alt="${property.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.style.background='${randomGradient}'">`
                : '';
            const bgStyle = hasImage ? '' : `background: ${randomGradient};`;
            
            card.className = 'property-card property-card-3d';

            card.innerHTML = `
                <div class="property-image" style="${bgStyle}">
                    ${imageHtml}
                    <div class="property-badge">${property.featured ? '⭐ Featured' : property.listingType === 'rent' ? '🔑 Rent' : '🏷️ Sale'}</div>
                    <button class="btn-3d-favorite">🤍</button>
                </div>
                <div class="property-info">
                    <div class="property-price">${formattedPrice}</div>
                    <div class="property-name">${property.title}</div>
                    <div style="margin: 0.5rem 0;">
                        <span style="
                            display: inline-block;
                            padding: 0.25rem 0.75rem;
                            border-radius: 20px;
                            font-size: 0.75rem;
                            font-weight: 600;
                            ${property.verificationStatus === PropertiesData.VERIFICATION_STATUS.VERIFIED 
                                ? 'background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3);' 
                                : 'background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3);'}
                        ">
                            ${property.verificationStatus === PropertiesData.VERIFICATION_STATUS.VERIFIED ? '✓ Verified' : '⏳ Under Review'}
                        </span>
                    </div>
                    <div class="property-location">
                        <span>📍</span>
                        <span>${property.area}, ${property.city}</span>
                    </div>
                    <div class="property-specs">
                        <div class="spec-item">
                            <span class="spec-icon">🛏️</span>
                            <span>${property.bhk}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-icon">🚿</span>
                            <span>${property.bathrooms} Bath</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-icon">📏</span>
                            <span>${property.sqft} sqft</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">
                        <button class="btn-3d-primary btn-view-details" data-property-id="${property.id}" style="flex: 1;"><span>View Details</span></button>
                        <button class="btn-3d-ghost btn-view-map" data-property-id="${property.id}" style="flex: 1;">🗺️ Map</button>
                    </div>
                </div>
            `;
            
            // Add favorite button handler
            const favoriteBtn = card.querySelector('.btn-3d-favorite');
            favoriteBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                this.textContent = this.textContent === '❤️' ? '🤍' : '❤️';
            });
            
            // Add View Details button handler
            const viewDetailsBtn = card.querySelector('.btn-view-details');
            viewDetailsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                handlePropertyClick(property.id);
            });
            
            // Add View on Map button handler
            const viewMapBtn = card.querySelector('.btn-view-map');
            viewMapBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                handleViewOnMap(property.id);
            });
            
            return card;
        }
        
        function handlePropertyClick(propertyId) {
            // Store selected property ID in AppState
            AppState.setPropertyId(propertyId);
            console.log('📍 Selected property:', propertyId);
            
            // Navigate to property detail page
            Navigation.goToPropertyDetail(propertyId);
        }
        
        function handleViewOnMap(propertyId) {
            // Store selected property ID in AppState
            AppState.setPropertyId(propertyId);
            console.log('🗺️ Viewing property on map:', propertyId);
            
            // Navigate to map page
            Navigation.goToMap(propertyId);
        }
        
        // ==================== USER PROFILE ====================
        
        function updateUserProfile() {
            const user = AppState.getUser();
            if (user && user.name) {
                const userProfileIcon = document.querySelector('.user-profile');
                // Show first letter of name
                userProfileIcon.textContent = user.name.charAt(0).toUpperCase();
                
                // The click handler and popup is now managed by profile-menu.js
            }
        }
        
        function handleGuestProfileClick() {
            alert('Please login to access your profile and saved properties');
            AppState.setIntent('profile');
            Navigation.goToLogin();
        }
        
        // ==================== QUICK ACTIONS ====================
        
        // Handle quick action buttons with real navigation
        async function handleAction(action) {
            // Check if user is logged in first
            if (!AppState.isLoggedIn()) {
                console.log(`User not logged in. Storing intent: ${action}`);
                // Store intent and redirect to login
                AppState.setIntent(action);
                Navigation.goToLogin();
                return;
            }
            
            // User is logged in, proceed with action
            switch(action) {
                case 'buy':
                    // Filter properties for sale
                    const buyProperties = await PropertiesData.getPropertiesByType('sale');
                    displayFilteredProperties(buyProperties, 'Buy');
                    break;
                case 'sell':
                    // Navigate to the property listing form
                    Navigation.goToAddProperty();
                    break;
                case 'map':
                    // Navigate to map page
                    Navigation.goToMap();
                    break;
                case 'filter':
                    // Show all properties (filter functionality)
                    loadAllProperties();
                    break;
                default:
                    console.log('Unknown action:', action);
            }
        }
        
        function displayFilteredProperties(properties, typeLabel) {
            const propertyGrid = document.querySelector('.property-grid');
            const sectionTitle = document.querySelector('.featured-section .section-title');
            
            // Update title
            sectionTitle.textContent = `${typeLabel} Properties`;
            
            // Show loading skeleton briefly
            EmptyStates.showLoadingSkeletons(propertyGrid, 4);
            
            setTimeout(() => {
                // Clear grid
                propertyGrid.innerHTML = '';
                
                if (properties.length === 0) {
                    const filterType = typeLabel.toLowerCase() === 'buy' ? 'sale' : 'rent';
                    propertyGrid.innerHTML = EmptyStates.getNoFilteredResultsState(filterType);
                    return;
                }
                
                // Display filtered properties with animation
                properties.forEach((property, index) => {
                    const card = createPropertyCard(property);
                    card.classList.add('fade-in');
                    card.style.animationDelay = `${index * 0.05}s`;
                    propertyGrid.appendChild(card);
                });
                
                console.log(`📊 Showing ${properties.length} ${typeLabel.toLowerCase()} properties`);
            }, 200);
        }

        // ==================== SEARCH ====================
        
        // Search functionality
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', async function(e) {
            const query = e.target.value;
            
            // Clear previous timeout
            clearTimeout(searchTimeout);
            
            if (query.length > 2) {
                // Debounce search
                searchTimeout = setTimeout(async () => {
                    const results = await PropertiesData.searchProperties(query);
                    console.log(`🔍 Search results for "${query}":`, results.length, 'properties found');
                    
                    // Update property grid with search results
                    const propertyGrid = document.querySelector('.property-grid');
                    propertyGrid.innerHTML = '';
                    
                    if (results.length > 0) {
                        results.forEach((property, index) => {
                            const card = createPropertyCard(property);
                            card.classList.add('fade-in');
                            card.style.animationDelay = `${index * 0.05}s`;
                            propertyGrid.appendChild(card);
                        });
                    } else {
                        propertyGrid.innerHTML = EmptyStates.getNoSearchResultsState(query);
                    }
                }, 300);
            } else if (query.length === 0) {
                // If search cleared, reload all properties
                loadAllProperties();
            }
        });

        // ==================== PROPERTY INTERACTIONS ====================
        
        // Property interactions are now handled in createPropertyCard() function

        // ==================== BOTTOM NAVIGATION ====================
        
        // Bottom nav click
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
